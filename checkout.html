<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="assets/css/checkout.css">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/photos/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/photos/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/photos/favicon_io/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/photos/favicon_io/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/photos/favicon_io/android-chrome-512x512.png">
    <link rel="manifest" href="/site.webmanifest">
</head>

<body>
    <div class="container">
        <header>
            <h1>Checkout</h1>
        </header>

        <!-- Order Summary Section -->
        <section class="order-summary">
            <h2>Order Summary</h2>
            <ul id="cart-items-list"></ul>
            <div class="summary-total">
                <span>Total:</span>
                <span id="cart-total">Rs. 0.00</span>
            </div>
        </section>

        <!-- Delivery Details Section -->
        <section class="delivery-details">
            <h2>Delivery Details</h2>
            <form id="checkout-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" required>
                </div>
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" name="city" required>
                </div>
                <div class="form-group">
                    <label for="state">State</label>
                    <input type="text" id="state" name="state" required>
                </div>
                <div class="form-group">
                    <label for="zip">Zip Code</label>
                    <input type="text" id="zip" name="zip" required>
                </div>
                <button type="submit" class="btn btn-primary " style="text-align: center;">Place Order</button>
            </form>
        </section>


        <!-- Footer -->
        <footer>
            <a href="menu.html" class="btn btn-secondary">Back to Menu</a>
        </footer>
    </div>

    <script src="assets/js/checkout.js"></script> <!-- Link to JavaScript -->
</body>

</html>
