<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPI Payment Processing</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/payment.css">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/photos/favicon_io/favicon-32x32.png">
    <link rel="manifest" href="/site.webmanifest">
    <style>
        .payment-container {
            margin-top: 20px;
        }
        .qr-code img {
            max-width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container payment-container">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card p-4">
                <h3 class="text-center">UPI Payment Processing</h3>
                <p class="text-center">Please complete your payment using one of the following methods.</p>

                <!-- UPI ID Input -->
                <div id="upi-id-section" class="mb-4">
                    <h5>Enter Your UPI ID</h5>
                    <input type="text" id="upiId" class="form-control" placeholder="Enter your UPI ID" required>
                </div>

                <!-- QR Code Display -->
                <div id="qr-code-section" class="mb-4">
                    <h5>Scan QR Code for Payment</h5>
                    <div class="qr-code text-center">
                        <img id="qrCodeImg" src="" alt="QR Code">
                    </div>
                </div>

                <!-- Proceed Button -->
                <div class="text-center">
                    <button id="confirm-payment" class="btn btn-primary btn-lg">Confirm Payment</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<!-- JavaScript -->
<script src="assets/js/upi_payment.js"></script>
<script>// JavaScript for UPI Payment Processing

    document.addEventListener("DOMContentLoaded", function () {
        // Get UPI Method from URL Parameters
        const urlParams = new URLSearchParams(window.location.search);
        const upiMethod = urlParams.get("upiMethod");
    
        // Set QR Code Image Based on Selected UPI Method
        const qrCodeImg = document.getElementById("qrCodeImg");
    
        switch (upiMethod) {
            case "PhonePe":
                qrCodeImg.src = "assets/images/phonepe_qr.png";
                break;
            case "GooglePay":
                qrCodeImg.src = "assets/images/googlepay_qr.png";
                break;
            case "Paytm":
                qrCodeImg.src = "assets/images/paytm_qr.png";
                break;
            default:
                qrCodeImg.src = "";
                break;
        }
    
        // Add Event Listener for Confirm Payment Button
        document.getElementById("confirm-payment").addEventListener("click", function () {
            const upiId = document.getElementById("upiId").value.trim();
    
            if (upiId) {
                // Simulate payment confirmation
                alert("Payment confirmed. Thank you!");
                window.location.href = "thankyou.html";
            } else {
                alert("Please enter your UPI ID.");
            }
        });
    });
    </script>

</body>
</html>
