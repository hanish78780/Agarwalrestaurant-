<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Delivery Order Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/order.css">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/photos/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/photos/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/photos/favicon_io/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/photos/favicon_io/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/photos/favicon_io/android-chrome-512x512.png">
    <link rel="manifest" href="/site.webmanifest">
</head>

<body>
    <div class="container">
        <h1 class="text-center mb-4">Meal Delivery Order Form</h1>
        <form id="order-form">
            <div class="row mb-2">
                <div class="col-md-6 mb-2 ">
                    <label for="firstName" class="form-label">First Name</label>
                    <input type="text" class="form-control" name="firstName" id="firstName" placeholder="First" required>
                    <div class="invalid-feedback">Please enter a first name</div>
                </div>
                <div class="col-md-6 mb-2">
                    <label for="lastName" class="form-label">Last Name</label>
                    <input type="text" class="form-control" name="lastName" id="lastName" placeholder="Last" required>
                    <div class="invalid-feedback">Please enter a last name</div>
                </div>
            </div>
            <div class="mb-4">
                <label for="phoneNumber" class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="phoneNumber" placeholder="Phone Number" required>
                <div class="invalid-feedback">Please enter a valid phone number</div>
            </div>
            <div class="mb-4">
                <label for="streetAddress" class="form-label">Delivery Address</label>
                <input type="text" class="form-control mb-2" id="streetAddress" placeholder="Street Address" required>
                <input type="text" class="form-control mb-2" id="streetAddress2" placeholder="Street Address Line 2">
                <div class="row">
                    <div class="col-md-6 mb-2">
                        <input type="text" class="form-control" id="city" placeholder="City" required>
                    </div>
                    <div class="col-md-6 mb-2">
                        <input type="text" class="form-control" id="state" placeholder="State" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-2">
                        <input type="text" class="form-control" id="postalCode" placeholder="Postal / Zip Code" required>
                    </div>
                    <div class="col-md-6 mb-2">
                        <select class="form-select" id="country" required>
                            <option value="" selected disabled>Select Country</option>
                            <option value="India">India</option>
                            <option value="Romania">Romania</option>
                            <option value="USA">USA</option>
                            <option value="Canada">Canada</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="meal-item d-flex align-items-center mb-4 p-3 border rounded">
                <img id="img" width="100" height="100" alt="Meal Image" class="me-3">
                <div class="meal-details">
                    <div><strong id="title"></strong></div>
                    <div id="text"></div>
                    <div id="price" class="meal-price"></div>
                    <div id="rating"></div>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="proceed-to-payment">Submit Order</button>
        </form>
    </div>

    <script src="assets/js/order.js"></script>
</body>

</html>
