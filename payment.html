<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Page</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/payment.css">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/photos/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/photos/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/photos/favicon_io/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
</head>

<body>

    <div class="container checkout-container">
        <div class="row">
            <!-- Left Column: Checkout Form -->
            <div class="col-md-7">
                <div class="card p-4">
                    <h3 class="text-center">Checkout</h3>

                    <label for="paymentMethod">Choose Payment Method:</label><br>
                    <!-- Payment Method Selection with Icons -->
                    <div class="form-group d-flex col-md-12 mb-3">
                        <div class="form-control">
                            <input type="radio" name="paymentMethod" id="creditCard" value="creditCard" checked>
                            <label for="creditCard">
                                <img src="https://img.icons8.com/color/48/visa.png" alt="Credit Card Icon" width="30"
                                    style="margin-right: 10px;">Credit Card
                            </label>
                        </div>
                        <div class="form-control">
                            <input type="radio" name="paymentMethod" id="upi" value="upi">
                            <label for="upi">
                                <img src="/assets/photos/upi-icon.png" alt="UPI Icon" width="30"
                                    style="margin-right: 10px;">UPI
                            </label>
                        </div>
                        <div class="form-control">
                            <input type="radio" name="paymentMethod" id="cod" value="cod">
                            <label for="cod">
                                <img src="https://img.icons8.com/color/48/cash.png" alt="Cash on Delivery Icon"
                                    width="30" style="margin-right: 10px;">Cash on Delivery
                            </label>
                        </div>
                    </div>

                    <!-- UPI Payment Options -->
                    <div id="upiOptions" class="d-none">
                        <h5>Select UPI Payment Method</h5>
                        <div class="d-flex justify-content-around flex-wrap">
                            <div class="form-check p-3 border rounded text-center m-2 upi-box">
                                <input type="radio" name="upiMethod" id="phonePe" value="PhonePe">
                                <label for="phonePe" class="d-block">
                                    <img src="https://img.icons8.com/?size=100&id=OYtBxIlJwMGA&format=png&color=000000"
                                        alt="PhonePe Icon" width="40" style="margin-bottom: 10px;">
                                    PhonePe
                                </label>
                            </div>
                            <div class="form-check p-3 border rounded text-center m-2 upi-box">
                                <input type="radio" name="upiMethod" id="googlePay" value="GooglePay">
                                <label for="googlePay" class="d-block">
                                    <img src="https://img.icons8.com/color/48/google-pay.png" alt="Google Pay Icon"
                                        width="40" style="margin-bottom: 10px;">
                                    Google Pay
                                </label>
                            </div>
                            <div class="form-check p-3 border rounded text-center m-2 upi-box">
                                <input type="radio" name="upiMethod" id="paytm" value="Paytm">
                                <label for="paytm" class="d-block">
                                    <img src="https://img.icons8.com/color/48/paytm.png" alt="Paytm Icon" width="40"
                                        style="margin-bottom: 10px;">
                                    Paytm
                                </label>
                            </div>
                            <div class="form-check p-3 border rounded text-center m-2 upi-box">
                                <input type="radio" name="upiMethod" id="upiId" value="UPIID">
                                <label for="upiId" class="d-block">
                                    <img src="https://img.icons8.com/?size=100&id=5RcHTSNy4fbL&format=png&color=000000"
                                        alt="UPI Icon" width="40" style="margin-bottom: 10px;">
                                    Enter UPI ID
                                </label>
                            </div>
                        </div>



                        <!-- Input for UPI ID -->
                        <div id="upiIdInput" class="form-group mt-3 d-none">
                            <label for="upiIdValue">UPI ID</label>
                            <input type="text" class="form-control" id="upiIdValue" placeholder="Enter UPI ID">
                        </div>

                        <!-- QR Code for UPI Payment -->
                        <div id="qrCode" class="mt-3 d-none text-center">
                            <img src="" alt="QR Code" id="qrCodeImg" width="200" height="200">
                        </div>
                    </div>

                    <!-- Billing Details -->
                    <div class="row">
                        <h5>Billing Details</h5>
                        <div class="form-group col-md-6 mb-3">
                            <label for="email">Email Address</label>
                            <input type="email" class="form-control" id="email" placeholder="Email Address" required>
                        </div>
                        <div class="form-group col-md-6 mb-3">
                            <label for="password">Password</label>
                            <input type="password" class="form-control" id="password" placeholder="Password" required>
                        </div>
                        <div class="form-group col-md-6 mb-3">
                            <label for="country">Billing Country</label>
                            <select class="form-select" id="country" required>
                                <option value="">Select Country</option>
                                <option value="IN">India</option>
                                <option value="US">United States</option>
                                <option value="CA">Canada</option>
                                <option value="UK">United Kingdom</option>
                            </select>
                        </div>
                        <div class="form-group col-md-6 mb-3">
                            <label for="zip">Billing Zip / Postal Code</label>
                            <input type="number" class="form-control" id="zip" placeholder="Zip / Postal Code" required>
                        </div>
                    </div>

                    <!-- Credit Card Info -->
                    <div id="creditCardInfo">
                        <h5>Credit Card Info</h5>
                        <div class="row">
                            <div class="form-group col-md-6 mb-3">
                                <label for="cardNumber">Card Number</label>
                                <input type="number" class="form-control" id="cardNumber" placeholder="Card Number"
                                    maxlength="16" pattern="\d{16}" required>
                            </div>
                            <div class="form-group col-md-6 mb-3">
                                <label for="cardHolder">Card Holder Name</label>
                                <input type="text" class="form-control" id="cardHolder" placeholder="Card Holder Name"
                                    required>
                            </div>
                            <div class="form-group col-md-6 mb-3">
                                <label for="expDate">EXP. Date</label>
                                <input type="text" class="form-control" id="expDate" placeholder="MM/YY" maxlength="5"
                                    pattern="(0[1-9]|1[0-2])\/([0-9]{2})" required>
                            </div>
                            <div class="form-group col-md-6 mb-3">
                                <label for="cvv">CVV</label>
                                <input type="number" class="form-control" id="cvv" placeholder="CVV" maxlength="3"
                                    pattern="\d{3}" required>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Order Summary -->
            <div class="col-md-4">
                <div class="order-summary text-center p-4 border shadow-sm">
                    <h3 class="mb-2">Order Summary</h3>

                    <!-- Image Section with hover effect -->
                    <div class="image-container mb-2">
                        <img id="img" width="370" height="150" alt="Meal Image"
                            style="border-radius: 10px; transition: transform 0.3s;">
                    </div>

                    <!-- Title -->
                    <h5 class="card-title mb-2" id="title">Meal Title</h5>

                    <!-- Price, Quantity -->
                    <p class="card-text"><span id="price">Meal Price:</span></p>
                    <p class="card-text mb-1">Quantity: <input type="number" id="quantity"
                            class="form-control d-inline-block w-25 text-center" min="1" value="1"></p>

                    <!-- Subtotal, Tax, and Total -->
                    <p class="card-text mb-1">Subtotal: <span id="subtotal"></span></p>
                    <p class="card-text mb-1" id="taxes">Taxes (10%): </p>
                    <h4 class="card-text mb-2" id="total">Total: </h4>

                    <!-- Change Plan Button -->
                    <a href="menu.html" class="btn btn-outline-primary"
                        style="border-radius: 20px; padding: 10px 20px;">Change Plan</a>

                    <!-- Proceed with Payment Button -->
                    <button type="submit" class="btn btn-primary btn-lg" id="make-payment"
                        style="border-radius: 20px;">Proceed with Payment</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <!-- JavaScript -->
    <script src="assets/js/payment.js"></script>



</body>

</html>
